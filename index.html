<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Basic Page</title>
    <meta name="description" content="Responsive food story and color cards layout with accessible image modal interactions." />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="Basic Page" />
    <meta property="og:description" content="Responsive food story and color cards layout with accessible image modal interactions." />
	<link rel="stylesheet" href="dest/css/style.css" />
</head>
<body>
	<main class="page">
        <section class="story-block js-section-reveal">
            <div class="container story-block__container">
                <div class="story-block__media-grid js-story-media-grid"></div>
                <div class="story-block__content js-story-content"></div>
            </div>
        </section><!-- end of story-block -->
        <section class="color-cards js-section-reveal">
            <div class="container color-cards__container text-center">
                <div class="color-cards__outer-wrapper">
                    <div class="color-cards__title-wrap">
                        <h2 class="color-cards__title js-cards-title"></h2>
                    </div>
                </div>
                
                <div class="color-cards__list js-cards-list"></div>
            </div>
        </section><!-- end of color-cards -->
	</main>
    <script src="dest/js/main.js" defer></script>
</body>
</html>
